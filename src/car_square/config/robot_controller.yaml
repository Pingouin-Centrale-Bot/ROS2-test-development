controller_manager:
  ros__parameters:
    update_rate: 10
    use_sim_time: false

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    omni_wheel_drive_controller:
      type: omni_wheel_drive_controller/OmniWheelDriveController

omni_wheel_drive_controller:
  ros__parameters:
    wheel_names:
      - lf_joint
      - rf_joint
      - rb_joint
      - lb_joint

    wheel_offset: 0.7854
     
    robot_radius: 1.750
    wheel_radius: 0.36

    base_frame_id: base_link
    odom_frame_id: odom

    open_loop: false
    position_feedback: false

    use_sim_time: false

    enable_odom_tf: true
    cmd_vel_timeout: 0.5
    publish_limited_velocity: true
